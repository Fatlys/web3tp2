
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD Futuriste - Tests</title>

    <!-- CSS Bootstrap -->
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <!-- CSS Bootstrap Icons -->
    <link rel="stylesheet" href="./node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <!-- CSS perso -->
    <link rel="stylesheet" href="./src/css/styles.css">

   
        <script type="importmap">
        {
          "imports": {
            "animejs": "./node_modules/animejs/dist/bundles/anime.esm.min.js"
          }
        }
        </script>
        <script src="./src/js/script.js" type="module"></script>
      
     
      
       
      
     


</head>
<body>

    <h1>Mon HUD Futuriste</h1>

    <div class="alert alert-primary mt-4">
        Test Bootstrap : Cette alerte fonctionne !
    </div>

    <button class="btn btn-success">Bouton Bootstrap</button>
    <i class="bi bi-alarm" style="font-size:40px;"></i>

    <!-- Canvas Chart.js -->
    <canvas id="chartTest" width="600" height="300"></canvas>

    <!-- Test Grid CSS -->
    <div class="grid-test" style="display:grid; grid-template-columns: repeat(3, 100px); gap:10px; margin-top:20px;">
        <div style="background:red; height:50px;"></div>
        <div style="background:green; height:50px;"></div>
        <div style="background:blue; height:50px;"></div>
    </div>

    <!-- Test bouton + fade -->
    <button id="alertBtn" class="btn btn-warning mt-3">Clique moi</button>
    <div id="alertBox" class="alert alert-info mt-2" style="display:none;">Tu as cliqué sur le bouton !</div>

    <!-- Test AnimeJS loop -->
    <div class="anime-loop" style="width:50px; height:50px; background:orange; margin-top:20px;"></div>

    <!-- Test Tone.js -->
    <button id="toneBtn" class="btn btn-danger mt-3">Jouer un son</button>

    <!-- Importmap pour animejs & chart.js -->
    <script type="importmap">
        {
            "imports": {
                "animejs": "./node_modules/animejs/lib/anime.es.js",
                "chart.js": "./node_modules/chart.js/dist/chart.esm.js",
                "@kurkle/color": "./node_modules/@kurkle/color/dist/color.esm.js",
                "tone": "./node_modules/tone/build/Tone.js"
            }
        }
    </script>

    <!-- Scripts MODULE -->
    <script src="./src/js/animejs.js" type="module"></script>
    <script src="./src/js/chartjs.js" type="module"></script>
    <script src="./src/js/vfx.js" type="module"></script>
    <script src="./src/js/tonejs.js" type="module"></script>

    <!-- Bootstrap JS -->
    <script src="./src/js/bootstrap.js" defer></script>

</body>
</html>
